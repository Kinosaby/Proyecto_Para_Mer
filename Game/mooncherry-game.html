<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para MoonCherry 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#0d0d18; --surface:#141428; --card-back:#191932;
  --rose:#e8789a; --lavender:#b89fd4; --gold:#e8c97a;
  --text:#f0e8f5; --muted:#7a708e; --glow:rgba(232,120,154,.35);
  --border:rgba(184,159,212,.22);
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{
  font-family:'Lora',Georgia,serif;
  background:var(--bg); color:var(--text);
  min-height:100vh; display:flex; flex-direction:column;
  align-items:center; padding:2rem 1rem 4rem;
  overflow-x:hidden; position:relative;
}

/* ── Stars ── */
.stars{position:fixed;inset:0;pointer-events:none;z-index:0;overflow:hidden}
.star{position:absolute;border-radius:50%;background:#fff;
  animation:twinkle var(--d,4s) ease-in-out infinite var(--del,0s)}
@keyframes twinkle{0%,100%{opacity:.1;transform:scale(1)}50%{opacity:.9;transform:scale(1.4)}}

/* ── Petals ── */
.petal{position:fixed;pointer-events:none;z-index:1;font-size:1.1rem;
  animation:petalFall linear infinite;opacity:0}
@keyframes petalFall{
  0%{opacity:0;transform:translateY(-20px) rotate(0deg)}
  10%{opacity:.6} 90%{opacity:.3}
  100%{opacity:0;transform:translateY(105vh) rotate(540deg)}
}

/* ── Wrapper ── */
.wrapper{position:relative;z-index:10;width:100%;max-width:640px;
  display:flex;flex-direction:column;align-items:center;gap:1.4rem}

/* ── Header ── */
header{width:100%;text-align:center;padding:1.4rem 2rem;
  background:rgba(20,20,40,.75);border:1px solid var(--border);
  border-radius:24px;backdrop-filter:blur(8px)}
.from-lbl{font-size:.7rem;letter-spacing:.3em;text-transform:uppercase;
  color:var(--muted);margin-bottom:.25rem}
header h1{font-family:'Playfair Display',serif;
  font-size:clamp(1.7rem,5vw,2.5rem);color:var(--rose);
  text-shadow:0 0 30px var(--glow);line-height:1.15}
header h1 span{color:var(--lavender)}
header p{color:var(--muted);font-style:italic;font-size:.85rem;margin-top:.35rem}

/* ── Stats ── */
.stats{display:flex;gap:2rem;font-size:.82rem;color:var(--muted);letter-spacing:.05em}
.stats strong{color:var(--gold)}

/* ── Grid ── */
.grid{display:grid;grid-template-columns:repeat(4,1fr);gap:.7rem;width:100%}

/* ── Cards ── */
.card{aspect-ratio:3/4;perspective:800px;cursor:pointer}
.card-inner{width:100%;height:100%;position:relative;
  transform-style:preserve-3d;
  transition:transform .55s cubic-bezier(.4,0,.2,1)}
.card.flipped .card-inner,.card.matched .card-inner{transform:rotateY(180deg)}
.card.matched .card-front{border-color:var(--rose);box-shadow:0 0 18px var(--glow)}

.card-front,.card-back{position:absolute;inset:0;backface-visibility:hidden;
  border-radius:14px;display:flex;flex-direction:column;
  align-items:center;justify-content:center;border:1px solid var(--border)}
.card-back{background:var(--card-back);overflow:hidden}
.card-back::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,rgba(184,159,212,.07) 0%,transparent 70%)}
.symbol{font-size:2rem;filter:drop-shadow(0 0 8px var(--glow));transition:transform .3s}
.card:not(.flipped):not(.matched):hover .symbol{transform:scale(1.2)}
.card-front{background:linear-gradient(145deg,#1e1e3a,#22183a);
  transform:rotateY(180deg);gap:.3rem}
.card-front .em{font-size:2.2rem}
.card-front .nm{font-size:.65rem;letter-spacing:.1em;text-transform:uppercase;color:var(--lavender)}

/* ── Buttons ── */
.btn{background:transparent;border:1px solid var(--rose);color:var(--rose);
  padding:.7rem 2.2rem;border-radius:50px;font-family:'Playfair Display',serif;
  font-size:.95rem;cursor:pointer;letter-spacing:.05em;
  transition:all .3s;position:relative;overflow:hidden}
.btn::before{content:'';position:absolute;inset:0;background:var(--rose);opacity:0;transition:opacity .3s}
.btn:hover{color:var(--bg)}.btn:hover::before{opacity:1}
.btn span{position:relative;z-index:1}

/* ── Footer ── */
footer{font-size:.75rem;color:var(--muted);letter-spacing:.12em;text-align:center;margin-top:.5rem}
footer em{color:var(--rose);font-style:normal}

/* ── Particles ── */
.particle{position:fixed;pointer-events:none;z-index:200;font-size:1.2rem;
  animation:pBurst 1.3s ease-out forwards}
@keyframes pBurst{
  0%{opacity:1;transform:translate(0,0) scale(1) rotate(0deg)}
  100%{opacity:0;transform:translate(var(--tx),var(--ty)) scale(.2) rotate(var(--r))}
}

/* ──────────────────────────────────────────
   PRIZE MODAL
────────────────────────────────────────── */
.prize-overlay{position:fixed;inset:0;z-index:500;
  background:rgba(6,6,16,.93);backdrop-filter:blur(6px);
  display:none;align-items:center;justify-content:center;padding:1rem}
.prize-overlay.show{display:flex;animation:fadeIn .4s ease}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}

.prize-box{width:100%;max-width:480px;background:var(--surface);
  border:1px solid var(--border);border-radius:28px;overflow:hidden;
  box-shadow:0 0 60px rgba(184,159,212,.15);
  display:flex;flex-direction:column;max-height:90vh}

.prize-hdr{padding:1.4rem 1.5rem .9rem;text-align:center;
  border-bottom:1px solid var(--border);flex-shrink:0}
.p-emoji{font-size:2.8rem;margin-bottom:.2rem;display:block}
.prize-hdr h2{font-family:'Playfair Display',serif;color:var(--rose);
  font-size:1.35rem;text-shadow:0 0 20px var(--glow)}

.prize-body{padding:1.4rem;flex:1;overflow-y:auto;min-height:100px}

/* Prize types */
.prize-poem{font-style:italic;font-size:.93rem;color:#c9bedd;
  white-space:pre-line;line-height:2.1;text-align:center}
.prize-canvas{width:100%;height:220px;border-radius:14px;
  display:block;margin-bottom:1rem;background:#04020e}

/* Letter */
.prize-letter{background:rgba(255,255,255,.03);border:1px solid var(--border);
  border-radius:12px;padding:1.2rem 1.4rem;font-size:.9rem;
  line-height:1.95;color:#d4c9e8;font-style:italic;min-height:120px}
.cursor{display:inline-block;animation:blink .8s step-end infinite;color:var(--rose)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* Coupon */
.prize-coupon{border:2px dashed var(--gold);border-radius:16px;
  padding:1.6rem 1.4rem;text-align:center;position:relative;overflow:hidden}
.prize-coupon::before{content:'';position:absolute;inset:0;
  background:radial-gradient(circle at 50% 50%,rgba(232,201,122,.06) 0%,transparent 70%)}
.c-emoji{font-size:3.2rem;margin-bottom:.4rem;display:block}
.c-title{font-family:'Playfair Display',serif;color:var(--gold);font-size:1.2rem;margin-bottom:.5rem}
.c-desc{color:#c9bedd;font-size:.87rem;font-style:italic;line-height:1.8}
.c-seal{margin-top:1rem;font-size:.68rem;letter-spacing:.18em;
  text-transform:uppercase;color:var(--gold);opacity:.7}

.prize-footer{padding:.9rem 1.5rem;border-top:1px solid var(--border);
  text-align:center;flex-shrink:0}

/* ── Win Overlay ── */
.win-overlay{position:fixed;inset:0;z-index:600;background:rgba(6,6,16,.95);
  display:none;align-items:center;justify-content:center;padding:1rem}
.win-overlay.show{display:flex;animation:fadeIn .6s ease}
.win-box{max-width:440px;width:100%;background:var(--surface);
  border:1px solid var(--rose);border-radius:28px;padding:2.4rem 2rem;
  text-align:center;box-shadow:0 0 60px var(--glow)}
.win-box h2{font-family:'Playfair Display',serif;color:var(--rose);
  font-size:2rem;margin:.4rem 0}
.win-box p{font-style:italic;color:#c9bedd;line-height:2;
  white-space:pre-line;margin-bottom:1.2rem;font-size:.9rem}
.win-big{font-size:2.8rem}

@media(max-width:440px){
  .grid{gap:.45rem}
  .card-front .em{font-size:1.9rem}
}
</style>
</head>
<body>

<div class="stars" id="stars"></div>
<div id="petals"></div>

<!-- PRIZE MODAL -->
<div class="prize-overlay" id="prizeOverlay">
  <div class="prize-box">
    <div class="prize-hdr">
      <span class="p-emoji" id="pEmoji"></span>
      <h2 id="pTitle"></h2>
    </div>
    <div class="prize-body" id="prizeBody"></div>
    <div class="prize-footer">
      <button class="btn" onclick="closePrize()"><span>💝 ¡Gracias!</span></button>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div class="win-big">🌸💝🌸</div>
    <h2>¡Lo lograste!</h2>
    <p id="winMsg"></p>
    <button class="btn" onclick="newGame()"><span>🌙 Jugar de nuevo</span></button>
  </div>
</div>

<div class="wrapper">
  <header>
    <div class="from-lbl">de Kinosaby · para</div>
    <h1>Moon<span>Cherry</span> 🌸</h1>
    <p>Encuentra los pares · cada uno esconde algo especial para ti</p>
  </header>

  <div class="stats">
    <div>Intentos: <strong id="moveCnt">0</strong></div>
    <div>Parejas: <strong id="matchCnt">0</strong> / 6</div>
    <div>Partida: <strong id="gameCnt">1</strong></div>
  </div>

  <div class="grid" id="grid"></div>
  <button class="btn" onclick="newGame()"><span>🌙 Nuevo Juego</span></button>
  <footer>hecho con amor por <em>Kinosaby</em> &nbsp;·&nbsp; solo para <em>MoonCherry</em></footer>
</div>

<script>
/* ═══════════════════════════════════════════════
   CARD POOL  —  15 tipos, 6 aleatorios por partida
═══════════════════════════════════════════════ */
const POOL=[
  {id:'luna',      emoji:'🌙', name:'Luna'},
  {id:'mariposa',  emoji:'🦋', name:'Mariposa'},
  {id:'mar',       emoji:'🌊', name:'Océano'},
  {id:'estrella',  emoji:'⭐', name:'Estrella'},
  {id:'girasol',   emoji:'🌻', name:'Girasol'},
  {id:'fresa',     emoji:'🍓', name:'Fresa'},
  {id:'musica',    emoji:'🎵', name:'Melodía'},
  {id:'cafe',      emoji:'☕', name:'Café'},
  {id:'vela',      emoji:'🕯️',name:'Vela'},
  {id:'diamante',  emoji:'💎', name:'Tesoro'},
  {id:'gerbera',   emoji:'🌺', name:'Gerbera'},
  {id:'medusa',    emoji:'🪼', name:'Medusa'},
  {id:'libro',     emoji:'📚', name:'Historia'},
  {id:'chocolate', emoji:'🍫', name:'Dulzura'},
  {id:'arcoiris',  emoji:'🌈', name:'Arcoíris'},
];

/* ═══════════════════════════════════════════════
   PREMIOS
═══════════════════════════════════════════════ */
const PRIZES={
  luna:{
    title:'Eres mi Luna',
    poem:`Cuando la noche cae\ny el mundo se apaga en calma,\ntu recuerdo ilumina\nlos rincones de mi alma.\n\nEres la luna llena\nque guía mi camino;\ncontigo de mi mano\nes más bello mi destino.`
  },
  mariposa:{
    title:'Libre y Hermosa',
    poem:`Como mariposa que vuela\nlibre entre jardines de luz,\ntú transformas mi vida\ncon tu presencia y tu paz.\n\nTus alas de mil colores\npintan el cielo a tu paso;\ncontigo cada instante\nes un milagro que atesoro.`
  },
  mar:{
    title:'Mi Océano',
    poem:`Eres el mar en calma,\nprofundo y sin final;\nen tus ojos encuentro\nmi lugar especial.\n\nComo las olas que vuelven\nsiempre a la misma orilla,\nmi amor regresa constante,\ncontigo la vida brilla.`
  },
  estrella:{
    title:'Mi Estrella',
    poem:`Entre millones de estrellas\nel universo te eligió;\nbrillas con luz propia\ndesde que llegaste a mi corazón.\n\nEres el norte que sigo,\nmi guía en noches oscuras;\ncon tu luz todo es posible\ny desaparecen las dudas.`
  },
  girasol:{
    title:'Mi Girasol',
    poem:`Como el girasol busca\nsiempre la luz del sol,\nyo busco en cada amanecer\ntu cálida voz y tu amor.\n\nGiras conmigo en la vida,\nfloreces en mi jardín;\neres el girasol dorado\nde mi principio y mi fin.`
  },
  fresa:{
    title:'Dulce como tú',
    poem:`Eres dulce como la fresa\nque madura bajo el sol;\nroja como mis mejillas\ncuando me llenas de amor.\n\nTe quiero como las mañanas\nquieren el primer café;\neres mi fruta favorita,\nla dulzura que siempre busqué.`
  },
  musica:{
    title:'Nuestra Melodía',
    poem:`Hay una canción que suena\ncada vez que pienso en ti;\nnota a nota construimos\nuna melodía sin fin.\n\nEres el ritmo que sigo,\nla letra que siempre recuerdo;\ncontigo la vida es música\ny nunca quiero que eso cambie.`
  },
  cafe:{
    type:'letter',
    title:'Buenos Días, Amor',
    letter:`MoonCherry,\n\nCada mañana me despierto pensando en ti. Hay algo especial en ese primer momento del día, cuando el café todavía está caliente y el mundo es tranquilo…\n\nEn ese silencio te recuerdo a ti.\n\nEres mi café de las mañanas: reconfortante, cálido, y lo primero que quiero.\n\nCon todo mi amor,\nKinosaby ☕`
  },
  vela:{
    title:'Luz en mi Oscuridad',
    poem:`Como vela que ilumina\nla noche más oscura,\ntú eres la luz que guía\nmi vida con ternura.\n\nTu llama nunca se apaga,\nardiente y misteriosa;\neres la vela eterna\nde mi historia amorosa.`
  },
  diamante:{
    type:'coupon',
    title:'Premio Especial',
    couponEmoji:'💎',
    couponTitle:'Noche de Películas',
    couponDesc:`Este cupón vale por una noche de películas juntos,\ncon palomitas, cobija y tus brazos a mi alrededor.\n\nCanjeable cuando quieras.\nSin fecha de vencimiento.`,
  },
  gerbera:{
    title:'Como una Gerbera',
    poem:`Eres como esta flor,\nradiante y llena de color;\ntu sonrisa ilumina mi día\ncon su cálido esplendor.\n\nCada pétalo es un beso,\ncada color una emoción;\neres mi gerbera eterna,\nla dueña de mi corazón.`
  },
  medusa:{
    title:'Criatura del Mar Profundo',
    poem:`Flotando en el mar de mis sueños\nuna medusa de luz apareció;\nen sus movimientos suaves y bellos\nmi corazón por siempre atrapó.\n\nEtérea y misteriosa,\ncriatura del océano;\neres el tesoro más precioso\nque encontré con mi mano.`
  },
  libro:{
    type:'letter',
    title:'Nuestra Historia',
    letter:`MoonCherry,\n\nSi nuestra historia fuera un libro, sería el más hermoso que he leído.\n\nCada capítulo contigo tiene momentos que quiero subrayar, páginas que quiero doblar para volver, y párrafos que quiero leer en voz alta.\n\nNo quiero que este libro tenga fin. Quiero seguir escribiéndolo contigo.\n\nCon todo mi amor,\nKinosaby 📚`
  },
  chocolate:{
    type:'coupon',
    title:'Premio Dulce',
    couponEmoji:'🍫',
    couponTitle:'Cupón de Mimos',
    couponDesc:`Este cupón vale por un día completo\ndonde tú eliges todo: película, comida,\npaseo, o simplemente quedarnos en casa.\n\nEres mi chocolate favorito —\nsin fecha de vencimiento.`,
  },
  arcoiris:{
    title:'Después de la Lluvia',
    poem:`Después de la tormenta\nsiempre apareces tú;\ncomo arcoíris que pinta\nel cielo de azul.\n\nSiete colores brillantes\nque forman tu sonrisa;\neres el arcoíris mío,\nmi promesa y mi divisa.`
  },
};

const WIN_MSGS=[
  `¡Encontraste todos los tesoros, MoonCherry!\n\nCada carta esconde un pedacito de lo que significas para mí.\nGracias por existir — Kinosaby 💝`,
  `¡Lo lograste!\n\nEste juego lo hice pensando en ti, en tus cosas favoritas y en todo lo que te hace especial. Espero que te haya sacado una sonrisa.\n\nSiempre tuyo — Kinosaby 🌸`,
  `¡Perfecta, como siempre!\n\nCada par que encontraste es una pequeña prueba de lo bonito que es pensar en ti. Este jueguito se queda corto para todo lo que siento.\n\nCon amor infinito — Kinosaby 💫`,
];

/* ═══════════════════════════════════════════════
   SETUP VISUAL
═══════════════════════════════════════════════ */
function makeStars(){
  const c=document.getElementById('stars');
  for(let i=0;i<120;i++){
    const s=document.createElement('div'); s.className='star';
    const sz=Math.random()*2.5+.4;
    s.style.cssText=`width:${sz}px;height:${sz}px;top:${Math.random()*100}%;left:${Math.random()*100}%;--d:${(Math.random()*5+2).toFixed(1)}s;--del:-${(Math.random()*8).toFixed(1)}s`;
    c.appendChild(s);
  }
}
function makePetals(){
  const c=document.getElementById('petals');
  const em=['🌸','🌺','💮','🪷'];
  for(let i=0;i<12;i++){
    const p=document.createElement('div'); p.className='petal';
    p.textContent=em[i%em.length];
    p.style.cssText=`left:${Math.random()*100}vw;animation-duration:${(Math.random()*12+8).toFixed(1)}s;animation-delay:${(Math.random()*12).toFixed(1)}s`;
    c.appendChild(p);
  }
}
function burst(x,y){
  const em=['💕','💖','💗','💝','🌸','✨','💫','⭐'];
  for(let i=0;i<10;i++){
    const p=document.createElement('div'); p.className='particle';
    p.textContent=em[Math.floor(Math.random()*em.length)];
    const a=(Math.PI*2*i)/10, d=50+Math.random()*70;
    p.style.cssText=`left:${x}px;top:${y}px;--tx:${Math.cos(a)*d}px;--ty:${Math.sin(a)*d}px;--r:${Math.random()*360}deg`;
    document.body.appendChild(p);
    setTimeout(()=>p.remove(),1400);
  }
}

/* ═══════════════════════════════════════════════
   GAME STATE
═══════════════════════════════════════════════ */
let deck=[],flipped=[],matched=[],moves=0,locked=false,gameCount=0;
let cleanupFn=null, pendingWin=false;

function newGame(){
  if(cleanupFn){cleanupFn();cleanupFn=null;}
  const pool=[...POOL].sort(()=>Math.random()-.5).slice(0,6);
  deck=[...pool,...pool].sort(()=>Math.random()-.5).map((c,i)=>({...c,uid:i}));
  flipped=[];matched=[];moves=0;locked=false;gameCount++;
  document.getElementById('moveCnt').textContent=0;
  document.getElementById('matchCnt').textContent=0;
  document.getElementById('gameCnt').textContent=gameCount;
  document.getElementById('winOverlay').classList.remove('show');
  renderGrid();
}
function renderGrid(){
  const g=document.getElementById('grid'); g.innerHTML='';
  deck.forEach(card=>{
    const el=document.createElement('div'); el.className='card'; el.dataset.uid=card.uid;
    el.innerHTML=`<div class="card-inner"><div class="card-back"><span class="symbol">💝</span></div><div class="card-front"><span class="em">${card.emoji}</span><span class="nm">${card.name}</span></div></div>`;
    el.addEventListener('click',()=>onFlip(el,card));
    g.appendChild(el);
  });
}
function onFlip(el,card){
  if(locked||el.classList.contains('flipped')||el.classList.contains('matched')||flipped.length===2)return;
  el.classList.add('flipped'); flipped.push({el,card});
  if(flipped.length===2){moves++;document.getElementById('moveCnt').textContent=moves;locked=true;setTimeout(check,900);}
}
function check(){
  const[a,b]=flipped;
  if(a.card.id===b.card.id){
    a.el.classList.replace('flipped','matched');
    b.el.classList.replace('flipped','matched');
    matched.push(a.card.id);
    document.getElementById('matchCnt').textContent=matched.length;
    [a.el,b.el].forEach(el=>{const r=el.getBoundingClientRect();burst(r.left+r.width/2,r.top+r.height/2);});
    pendingWin=matched.length===6;
    setTimeout(()=>showPrize(a.card),400);
  } else {
    setTimeout(()=>{a.el.classList.remove('flipped');b.el.classList.remove('flipped');locked=false;},400);
    locked=false;
  }
  flipped=[];
}

/* ═══════════════════════════════════════════════
   PRIZE SYSTEM
═══════════════════════════════════════════════ */
function showPrize(card){
  if(cleanupFn){cleanupFn();cleanupFn=null;}
  const prize=PRIZES[card.id];
  document.getElementById('pEmoji').textContent=card.emoji;
  document.getElementById('pTitle').textContent=prize.title||'Para ti 💝';
  const body=document.getElementById('prizeBody'); body.innerHTML='';
  const type=prize.type||'canvas_poem';
  if(type==='coupon') renderCoupon(body,prize);
  else if(type==='letter') renderLetter(body,prize);
  else renderCanvasPoem(body,card,prize);
  document.getElementById('prizeOverlay').classList.add('show');
  locked=true;
}
function closePrize(){
  if(cleanupFn){cleanupFn();cleanupFn=null;}
  document.getElementById('prizeOverlay').classList.remove('show');
  locked=false;
  if(pendingWin){pendingWin=false;setTimeout(showWin,600);}
}
function showWin(){
  document.getElementById('winMsg').textContent=WIN_MSGS[Math.floor(Math.random()*WIN_MSGS.length)];
  document.getElementById('winOverlay').classList.add('show');
  for(let i=0;i<30;i++) setTimeout(()=>burst(Math.random()*window.innerWidth,Math.random()*window.innerHeight*.6),i*100);
}

/* ── Coupon ── */
function renderCoupon(body,prize){
  body.innerHTML=`<div class="prize-coupon"><span class="c-emoji">${prize.couponEmoji}</span><div class="c-title">${prize.couponTitle}</div><div class="c-desc">${prize.couponDesc.replace(/\n/g,'<br>')}</div><div class="c-seal">✦ Kinosaby → MoonCherry ✦</div></div>`;
}

/* ── Letter (typewriter) ── */
function renderLetter(body,prize){
  body.innerHTML=`<div class="prize-letter" id="ltEl"></div>`;
  const el=document.getElementById('ltEl');
  const text=prize.letter; let i=0;
  function type(){
    if(i<=text.length){
      el.innerHTML=text.substring(0,i).replace(/\n/g,'<br>')+'<span class="cursor">|</span>';
      i++; setTimeout(type,i<5?30:22+Math.random()*35);
    } else { el.innerHTML=text.replace(/\n/g,'<br>'); }
  }
  type();
}

/* ── Canvas + Poem ── */
function renderCanvasPoem(body,card,prize){
  body.innerHTML=`<canvas id="pc" class="prize-canvas"></canvas><p class="prize-poem">${prize.poem}</p>`;
  setTimeout(()=>{
    const cv=document.getElementById('pc'); if(!cv)return;
    cv.width=cv.clientWidth||400; cv.height=cv.clientHeight||220;
    const map={luna:drawLuna,mar:drawMar,estrella:drawEstrella,girasol:drawGirasol,
      gerbera:drawGerbera,arcoiris:drawArcoiris,mariposa:drawMariposa,
      vela:drawVela,medusa:drawMedusa,fresa:drawFresa,musica:drawMusica};
    const fn=map[card.id]||drawParticles;
    cleanupFn=fn(cv);
  },20);
}

/* ── Luna ── */
function drawLuna(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const stars=Array.from({length:70},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,p:Math.random()*Math.PI*2,s:Math.random()*.025+.01}));
  let ss=null,ssT=0,raf;
  function draw(){
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#02021a');bg.addColorStop(1,'#07072a');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{s.p+=s.s;ctx.globalAlpha=.2+.8*Math.abs(Math.sin(s.p));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();});
    ctx.globalAlpha=1;
    const mx=W*.72,my=H*.28,mr=28;
    ctx.save();ctx.shadowColor='#ffe8a0';ctx.shadowBlur=18;
    ctx.beginPath();ctx.arc(mx,my,mr,0,Math.PI*2);ctx.fillStyle='#ffe8a0';ctx.fill();
    ctx.shadowBlur=0;ctx.beginPath();ctx.arc(mx+mr*.44,my,mr*.82,0,Math.PI*2);ctx.fillStyle='#02021a';ctx.fill();
    ctx.restore();
    ssT++;
    if(ssT>110&&!ss){ss={x:-10,y:Math.random()*H*.5,vx:5+Math.random()*4,vy:1.5+Math.random()*2};ssT=0;}
    if(ss){
      const g=ctx.createLinearGradient(ss.x-40,ss.y-14,ss.x,ss.y);
      g.addColorStop(0,'rgba(255,255,200,0)');g.addColorStop(1,'rgba(255,255,200,.9)');
      ctx.strokeStyle=g;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(ss.x-40,ss.y-14);ctx.lineTo(ss.x,ss.y);ctx.stroke();
      ss.x+=ss.vx;ss.y+=ss.vy;
      if(ss.x>W+50)ss=null;
    }
    raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Mar ── */
function drawMar(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const waves=[
    {a:18,f:.012,s:.04,y:H*.54,c:'rgba(30,90,170,.55)'},
    {a:13,f:.019,s:.065,y:H*.62,c:'rgba(50,120,200,.42)'},
    {a:9,f:.026,s:.09,y:H*.69,c:'rgba(70,150,220,.32)'},
  ];
  let t=0,raf;
  function draw(){
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#020218');bg.addColorStop(.5,'#040830');bg.addColorStop(1,'#061540');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const rf=ctx.createLinearGradient(W/2-14,H*.42,W/2+14,H);
    rf.addColorStop(0,'rgba(255,232,160,.28)');rf.addColorStop(1,'rgba(255,232,160,0)');
    ctx.fillStyle=rf;ctx.fillRect(W/2-12,H*.42,24,H*.58);
    waves.forEach(w=>{
      ctx.beginPath();ctx.moveTo(0,H);
      for(let x=0;x<=W;x+=2)ctx.lineTo(x,w.y+Math.sin(x*w.f+t*w.s)*w.a);
      ctx.lineTo(W,H);ctx.closePath();ctx.fillStyle=w.c;ctx.fill();
    });
    const fw=waves[0];
    for(let x=10;x<W;x+=28){
      const y=fw.y+Math.sin(x*fw.f+t*fw.s)*fw.a;
      ctx.globalAlpha=.3+.6*Math.abs(Math.sin(t*.04+x));
      ctx.fillStyle='#fff';ctx.fillRect(x,y-1,2,2);
    }
    ctx.globalAlpha=1;
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Estrella ── */
function drawEstrella(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const stars=Array.from({length:80},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.5+.3,p:Math.random()*Math.PI*2,s:Math.random()*.02+.01}));
  const shooters=[];let t=0,raf;
  function addS(){shooters.push({x:Math.random()*W*.4,y:Math.random()*H*.4,vx:4+Math.random()*5,vy:2+Math.random()*3,trail:[],a:1});}
  function draw(){
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#010112');bg.addColorStop(1,'#050535');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    stars.forEach(s=>{s.p+=s.s;ctx.globalAlpha=.15+.85*Math.abs(Math.sin(s.p));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle='#fff';ctx.fill();});
    ctx.globalAlpha=1;
    if(t%80===0)addS();
    for(let i=shooters.length-1;i>=0;i--){
      const sh=shooters[i];
      sh.trail.push({x:sh.x,y:sh.y});if(sh.trail.length>20)sh.trail.shift();
      sh.x+=sh.vx;sh.y+=sh.vy;sh.a-=.014;
      sh.trail.forEach((pt,j)=>{
        ctx.globalAlpha=(j/sh.trail.length)*sh.a*.8;
        ctx.beginPath();ctx.arc(pt.x,pt.y,1.5,0,Math.PI*2);ctx.fillStyle='#ffe8a0';ctx.fill();
      });
      if(sh.a<=0||sh.x>W+50)shooters.splice(i,1);
    }
    ctx.globalAlpha=1;
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Gerbera (bloom) ── */
function drawGerbera(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const cx=W/2,cy=H/2,N=16;
  const colors=['#e8789a','#f5a0b8','#d45080','#e090b0','#f0c0d0','#c06080'];
  let p=0,raf;
  function petal(ang,len,col,al){
    ctx.save();ctx.translate(cx,cy);ctx.rotate(ang);ctx.globalAlpha=al;
    const g=ctx.createLinearGradient(0,0,0,-len);
    g.addColorStop(0,col);g.addColorStop(1,'rgba(255,200,220,.4)');
    ctx.fillStyle=g;ctx.beginPath();ctx.ellipse(0,-len*.55,len*.18,len*.5,0,0,Math.PI*2);ctx.fill();ctx.restore();
  }
  function draw(){
    ctx.clearRect(0,0,W,H);
    const bg=ctx.createRadialGradient(cx,cy,0,cx,cy,W*.6);
    bg.addColorStop(0,'#190a20');bg.addColorStop(1,'#060614');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    if(p>.8){const a=(p-.8)/.2;ctx.globalAlpha=a;ctx.strokeStyle='#4a8a4a';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(cx,cy+28);ctx.lineTo(cx,H-8);ctx.stroke();ctx.globalAlpha=1;}
    const vis=Math.floor(p*N);
    for(let i=0;i<N;i++){
      const ang=(i/N)*Math.PI*2,show=i<vis,frac=i===vis?(p*N)%1:0;
      const al=show?1:frac,len=show||frac>0?44*(show?1:frac):0;
      if(len>2)petal(ang,len,colors[i%colors.length],al);
    }
    if(p>.65){const ip=(p-.65)/.35;for(let i=0;i<8;i++)petal((i/8)*Math.PI*2+Math.PI/8,22*ip,'#ffb0cc',ip*.8);}
    if(p>.55){
      const cp=(p-.55)/.45;ctx.globalAlpha=cp;
      const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,22);
      cg.addColorStop(0,'#ffd060');cg.addColorStop(.5,'#e8a030');cg.addColorStop(1,'#804020');
      ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,22*cp,0,Math.PI*2);ctx.fill();
      for(let i=0;i<22;i++){const da=Math.random()*Math.PI*2,dr=Math.random()*15;ctx.globalAlpha=cp*.7;ctx.fillStyle='#5a2a08';ctx.beginPath();ctx.arc(cx+Math.cos(da)*dr,cy+Math.sin(da)*dr,1.3,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=1;
    }
    if(p<1)p+=.007;
    raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Arcoíris ── */
function drawArcoiris(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const colors=['#ff4040','#ff9020','#ffe030','#40cc40','#3090ff','#6040e0','#a040c0'];
  const drops=Array.from({length:50},()=>({x:Math.random()*W,y:Math.random()*H,s:3+Math.random()*4,l:10+Math.random()*15,a:Math.random()*.6+.2}));
  let prog=0,t=0,raf;
  function draw(){
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#08101e');bg.addColorStop(1,'#040c18');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const ra=Math.max(0,1-prog*2.2);
    if(ra>0){
      ctx.globalAlpha=ra;
      drops.forEach(d=>{d.y+=d.s;if(d.y>H)d.y=-d.l;ctx.strokeStyle=`rgba(160,180,220,${d.a})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(d.x,d.y);ctx.lineTo(d.x-1,d.y+d.l);ctx.stroke();});
      ctx.globalAlpha=1;
    }
    const bx=W/2,by=H+20,maxR=Math.min(W*.76,H+22);
    colors.forEach((col,i)=>{
      const r=maxR-(i*(maxR/colors.length)*.19);
      const ea=Math.PI+(Math.PI*Math.min(1,(prog-i*.04)*1.15));
      if(prog<i*.04)return;
      ctx.beginPath();ctx.arc(bx,by,r,Math.PI,ea);
      ctx.strokeStyle=col;ctx.lineWidth=Math.max(6,Math.min(W,H)*.045);ctx.globalAlpha=.75;ctx.stroke();ctx.globalAlpha=1;
    });
    if(prog>=1){for(let i=0;i<4;i++){const sx=Math.random()*W,sy=Math.random()*(H*.5);ctx.globalAlpha=Math.random()*.7;ctx.fillStyle='#fff';ctx.fillRect(sx,sy,2,2);}ctx.globalAlpha=1;}
    if(prog<1)prog+=.006;
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Mariposa ── */
function drawMariposa(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  let t=0,raf;
  function draw(){
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.65);
    bg.addColorStop(0,'#180a30');bg.addColorStop(1,'#04051a');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const bx=W/2+Math.cos(t*.022)*75,by=H/2+Math.sin(t*.038)*38;
    const flap=Math.sin(t*.18)*.85;
    ctx.save();ctx.translate(bx,by);
    [[1,'#e8789a','#c050a0'],[-1,'#b89fd4','#8060c0']].forEach(([side,c1,c2])=>{
      ctx.save();ctx.scale(side,1);
      ctx.save();ctx.transform(Math.cos(flap),0,0,1,0,0);
      const ug=ctx.createRadialGradient(18,-8,0,18,-8,38);
      ug.addColorStop(0,c1+'cc');ug.addColorStop(1,c2+'66');
      ctx.fillStyle=ug;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(8,-22,36,-28,34,-4);ctx.bezierCurveTo(30,6,8,11,0,0);ctx.fill();
      const lg=ctx.createRadialGradient(13,14,0,13,14,26);
      lg.addColorStop(0,c2+'cc');lg.addColorStop(1,c1+'44');
      ctx.fillStyle=lg;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(7,5,26,18,20,26);ctx.bezierCurveTo(10,30,0,18,0,0);ctx.fill();
      ctx.restore();ctx.restore();
    });
    ctx.fillStyle='#3a1040';ctx.beginPath();ctx.ellipse(0,0,3,15,0,0,Math.PI*2);ctx.fill();
    ctx.fillStyle='#6a2060';ctx.beginPath();ctx.arc(0,-13,4,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.globalAlpha=.5+.4*Math.sin(t*.1);ctx.fillStyle='#e8c97a';ctx.fillRect(bx-1+Math.random()*2,by+Math.random()*3,1.5,1.5);ctx.globalAlpha=1;
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Girasol ── */
function drawGirasol(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const cx=W/2,cy=H*.5;
  let t=0,bloom=0,raf;
  function draw(){
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#080f02');bg.addColorStop(1,'#040900');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    ctx.save();ctx.translate(W*.78,H*.18);
    for(let i=0;i<12;i++){const a=(i/12)*Math.PI*2+t*.005,r1=16,r2=28+Math.sin(t*.05+i)*5;ctx.strokeStyle=`rgba(255,220,70,${.12+.08*Math.sin(t*.05+i)})`;ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(Math.cos(a)*r1,Math.sin(a)*r1);ctx.lineTo(Math.cos(a)*r2,Math.sin(a)*r2);ctx.stroke();}
    ctx.beginPath();ctx.arc(0,0,14,0,Math.PI*2);ctx.fillStyle='#ffe050';ctx.fill();ctx.restore();
    bloom=Math.min(1,bloom+.007);
    ctx.strokeStyle='#3a7a20';ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(cx,cy+28);ctx.quadraticCurveTo(cx+14,cy+58,cx+4,H-5);ctx.stroke();
    if(bloom>.3){
      const la=(bloom-.3)/.7;ctx.globalAlpha=la;
      [{lx:38,ly:72,rot:.38},{lx:-32,ly:108,rot:-.32}].forEach(({lx,ly,rot})=>{
        ctx.save();ctx.translate(cx+lx,cy+ly);ctx.rotate(rot);
        const lg=ctx.createLinearGradient(-14,0,14,0);lg.addColorStop(0,'#3a8020');lg.addColorStop(1,'#60a840');
        ctx.fillStyle=lg;ctx.beginPath();ctx.ellipse(0,0,18,9,0,0,Math.PI*2);ctx.fill();ctx.restore();
      });
      ctx.globalAlpha=1;
    }
    const pN=16,pL=36*bloom;
    for(let i=0;i<pN;i++){
      const ang=(i/pN)*Math.PI*2+t*.003,px=cx+Math.cos(ang)*(20+pL*.5),py=cy+Math.sin(ang)*(20+pL*.5);
      const pg=ctx.createRadialGradient(px,py,0,px,py,pL);
      pg.addColorStop(0,'#ffe060');pg.addColorStop(1,'#e8a020');
      ctx.fillStyle=pg;ctx.beginPath();ctx.ellipse(px,py,7*bloom,pL,ang,0,Math.PI*2);ctx.fill();
    }
    if(bloom>.42){
      const cp=(bloom-.42)/.58;ctx.globalAlpha=cp;
      const cg=ctx.createRadialGradient(cx,cy,0,cx,cy,20);
      cg.addColorStop(0,'#a06020');cg.addColorStop(.5,'#804010');cg.addColorStop(1,'#503010');
      ctx.fillStyle=cg;ctx.beginPath();ctx.arc(cx,cy,20,0,Math.PI*2);ctx.fill();
      for(let i=0;i<28;i++){const da=Math.random()*Math.PI*2,dr=Math.random()*14;ctx.globalAlpha=cp*.65;ctx.fillStyle='#2a1008';ctx.beginPath();ctx.arc(cx+Math.cos(da)*dr,cy+Math.sin(da)*dr,1.4,0,Math.PI*2);ctx.fill();}
      ctx.globalAlpha=1;
    }
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Vela ── */
function drawVela(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const cx=W/2;let t=0,raf;
  const smoke=[];
  function addSmoke(){smoke.push({x:cx+(Math.random()-.5)*8,y:H*.34,vx:(Math.random()-.5)*.6,vy:-.9-Math.random()*.5,r:2.5,a:.22,g:.18});}
  function draw(){
    ctx.fillStyle='#040210';ctx.fillRect(0,0,W,H);
    const fl=.9+.1*Math.sin(t*.18)+.05*Math.sin(t*.35);
    const fy=H*.34;
    const ag=ctx.createRadialGradient(cx,fy,0,cx,fy,90*fl);
    ag.addColorStop(0,`rgba(255,150,40,${.16*fl})`);ag.addColorStop(.5,`rgba(255,90,10,${.07*fl})`);ag.addColorStop(1,'transparent');
    ctx.fillStyle=ag;ctx.fillRect(0,0,W,H);
    if(t%12===0)addSmoke();
    for(let i=smoke.length-1;i>=0;i--){
      const p=smoke[i];p.x+=p.vx+Math.sin(t*.04+i)*.05;p.y+=p.vy;p.r+=p.g;p.a-=.005;p.vx+=(Math.random()-.5)*.04;
      if(p.a<=0){smoke.splice(i,1);continue;}
      ctx.globalAlpha=p.a;ctx.fillStyle='rgba(200,200,220,.5)';ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    }
    ctx.globalAlpha=1;
    const fh=36*fl,fw=11*fl;
    const fg=ctx.createRadialGradient(cx,fy-fh*.3,0,cx,fy,fh);
    fg.addColorStop(0,'rgba(255,255,200,1)');fg.addColorStop(.2,'rgba(255,200,50,.9)');fg.addColorStop(.6,'rgba(255,80,0,.7)');fg.addColorStop(1,'rgba(200,30,0,0)');
    ctx.save();ctx.translate(cx,fy);ctx.rotate(Math.sin(t*.11)*.08);
    ctx.fillStyle=fg;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-fw,-fh*.3,-fw*.8,-fh*.8,0,-fh);ctx.bezierCurveTo(fw*.8,-fh*.8,fw,-fh*.3,0,0);ctx.fill();
    const ifg=ctx.createRadialGradient(0,-fh*.25,0,0,-fh*.4,fh*.35);
    ifg.addColorStop(0,'rgba(255,255,240,1)');ifg.addColorStop(1,'rgba(255,220,100,0)');
    ctx.fillStyle=ifg;ctx.beginPath();ctx.moveTo(0,0);ctx.bezierCurveTo(-fw*.4,-fh*.2,-fw*.3,-fh*.55,0,-fh*.65);ctx.bezierCurveTo(fw*.3,-fh*.55,fw*.4,-fh*.2,0,0);ctx.fill();
    ctx.restore();
    ctx.strokeStyle='#3a2010';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(cx,fy+2);ctx.lineTo(cx,fy-4);ctx.stroke();
    const bTop=fy+5,bH=H-bTop-16;
    const cg=ctx.createLinearGradient(cx-14,0,cx+14,0);
    cg.addColorStop(0,'#ffe0c0');cg.addColorStop(.3,'#fff8f0');cg.addColorStop(1,'#c09060');
    ctx.fillStyle=cg;ctx.beginPath();ctx.rect(cx-13,bTop,26,bH);ctx.fill();
    ctx.fillStyle='rgba(255,240,200,.7)';ctx.beginPath();ctx.ellipse(cx+7,bTop+7,5,9,.3,0,Math.PI*2);ctx.fill();
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Medusa ── */
function drawMedusa(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const bubbles=Array.from({length:12},()=>({x:Math.random()*W,y:H+Math.random()*50,r:2+Math.random()*5,s:.3+Math.random()*.6,a:.3+Math.random()*.5}));
  let t=0,raf;
  function draw(){
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#010a1e');bg.addColorStop(1,'#040e32');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    const glow=ctx.createRadialGradient(W/2,H*.44,0,W/2,H*.44,80);
    glow.addColorStop(0,'rgba(184,159,212,.1)');glow.addColorStop(1,'transparent');
    ctx.fillStyle=glow;ctx.fillRect(0,0,W,H);
    bubbles.forEach(b=>{
      b.y-=b.s;b.x+=Math.sin(t*.02+b.y*.01)*.5;
      if(b.y<-20){b.y=H+20;b.x=Math.random()*W;}
      ctx.globalAlpha=b.a*(0.4+.6*Math.abs(Math.sin(t*.05+b.x)));
      ctx.strokeStyle='rgba(184,159,212,.7)';ctx.lineWidth=1;
      ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.stroke();
    });
    ctx.globalAlpha=1;
    const jx=W/2+Math.sin(t*.017)*28,jy=H*.42+Math.sin(t*.03)*16,pulse=1+.06*Math.sin(t*.08);
    ctx.save();ctx.translate(jx,jy);
    const jg=ctx.createRadialGradient(0,0,0,0,0,52);
    jg.addColorStop(0,'rgba(184,159,212,.22)');jg.addColorStop(1,'transparent');
    ctx.fillStyle=jg;ctx.fillRect(-60,-60,120,120);
    ctx.scale(pulse,1/pulse*.97);
    const dg=ctx.createRadialGradient(-11,-16,0,0,0,34);
    dg.addColorStop(0,'rgba(255,255,255,.5)');dg.addColorStop(.4,'rgba(184,159,212,.55)');dg.addColorStop(1,'rgba(130,80,180,.35)');
    ctx.fillStyle=dg;ctx.beginPath();ctx.arc(0,0,34,Math.PI,0);ctx.closePath();ctx.fill();
    ctx.strokeStyle='rgba(200,170,240,.5)';ctx.lineWidth=1.5;ctx.stroke();
    ctx.globalAlpha=.28+.1*Math.sin(t*.06);ctx.fillStyle='rgba(255,255,255,.3)';ctx.beginPath();ctx.ellipse(-9,-9,13,7,-.3,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;
    const tN=10;
    for(let i=0;i<tN;i++){
      const tx=(i/(tN-1)-.5)*60,len=28+Math.sin(t*.06+i)*14;
      ctx.strokeStyle=`rgba(184,159,212,${.28+.28*Math.sin(t*.07+i)})`;ctx.lineWidth=1.5;
      ctx.beginPath();ctx.moveTo(tx,0);ctx.quadraticCurveTo(tx+Math.sin(t*.05+i*.7)*11,len*.5,tx+Math.sin(t*.04+i)*7,len);ctx.stroke();
    }
    ctx.restore();
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Fresa ── */
function drawFresa(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  let t=0,raf;
  const pts=Array.from({length:18},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.9,vy:-.4-Math.random()*.9,a:.5+Math.random()*.5,sz:14+Math.random()*10,em:['💕','🍓','✨','💖'][Math.floor(Math.random()*4)]}));
  function sb(x,y,sc){
    ctx.save();ctx.translate(x,y);ctx.scale(sc,sc);
    const sg=ctx.createRadialGradient(-9,-9,0,0,9,38);
    sg.addColorStop(0,'#ff6080');sg.addColorStop(.5,'#e82040');sg.addColorStop(1,'#a01020');
    ctx.fillStyle=sg;ctx.beginPath();ctx.moveTo(0,-28);ctx.bezierCurveTo(20,-28,28,-10,26,9);ctx.bezierCurveTo(22,28,12,40,0,46);ctx.bezierCurveTo(-12,40,-22,28,-26,9);ctx.bezierCurveTo(-28,-10,-20,-28,0,-28);ctx.fill();
    const seeds=[[-11,-4],[0,-9],[11,-4],[-14,9],[-5,7],[8,9],[17,5],[-7,24],[5,23],[15,17],[-13,21],[0,29]];
    ctx.fillStyle='#ffe080';ctx.globalAlpha=.8;
    seeds.forEach(([sx,sy])=>{ctx.beginPath();ctx.ellipse(sx,sy,2.3,2.8,0,0,Math.PI*2);ctx.fill();});
    ctx.globalAlpha=1;
    [{lx:0,ly:-28,r:0},{lx:-9,ly:-27,r:-.4},{lx:9,ly:-27,r:.4}].forEach(({lx,ly,r})=>{
      ctx.save();ctx.translate(lx,ly);ctx.rotate(r);
      const lg=ctx.createLinearGradient(-5,-11,5,3);lg.addColorStop(0,'#40a020');lg.addColorStop(1,'#207010');
      ctx.fillStyle=lg;ctx.beginPath();ctx.ellipse(0,-8,5,11,0,0,Math.PI*2);ctx.fill();ctx.restore();
    });
    ctx.globalAlpha=.32;ctx.fillStyle='#fff';ctx.beginPath();ctx.ellipse(-8,-11,5,7,-.5,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;ctx.restore();
  }
  function draw(){
    const bg=ctx.createRadialGradient(W/2,H/2,0,W/2,H/2,W*.7);
    bg.addColorStop(0,'#1a0010');bg.addColorStop(1,'#06000a');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.a-=.003;
      if(p.a<0||p.y<-20){p.x=Math.random()*W;p.y=H+10;p.a=.6+Math.random()*.4;p.vy=-.4-Math.random()*.9;}
      ctx.globalAlpha=p.a;ctx.font=`${p.sz}px serif`;ctx.fillText(p.em,p.x,p.y);
    });
    ctx.globalAlpha=1;
    sb(W/2,H/2-4,1+.03*Math.sin(t*.06));
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Musica ── */
function drawMusica(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const notes=[];let t=0,raf;
  const syms=['♩','♪','♫','♬','🎵','🎶'];
  function addNote(){notes.push({x:50+Math.random()*(W-100),y:H+20,vy:-.9-Math.random()*1.2,vx:(Math.random()-.5)*.8,a:0,sz:15+Math.random()*11,sym:syms[Math.floor(Math.random()*syms.length)],ph:Math.random()*Math.PI*2});}
  function draw(){
    const bg=ctx.createLinearGradient(0,0,0,H);
    bg.addColorStop(0,'#05021a');bg.addColorStop(1,'#100520');
    ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
    for(let i=0;i<5;i++){const ly=H*.28+i*12;ctx.strokeStyle=`rgba(184,159,212,${.08+.04*Math.sin(t*.03+i)})`;ctx.lineWidth=1;ctx.beginPath();ctx.moveTo(0,ly);ctx.lineTo(W,ly);ctx.stroke();}
    if(t%20===0)addNote();
    for(let i=notes.length-1;i>=0;i--){
      const n=notes[i];n.y+=n.vy;n.x+=n.vx+Math.sin(t*.04+n.ph)*.5;n.a=Math.min(.9,n.a+.06);
      if(n.y<-30){notes.splice(i,1);continue;}
      ctx.globalAlpha=n.a;ctx.fillStyle=`hsl(${295+n.ph*35},70%,74%)`;ctx.font=`${n.sz}px serif`;ctx.fillText(n.sym,n.x,n.y);
    }
    ctx.globalAlpha=1;
    ctx.strokeStyle='rgba(232,120,154,.38)';ctx.lineWidth=2;ctx.beginPath();
    for(let x=0;x<=W;x+=3){const y=H*.82+Math.sin(x*.04+t*.08)*11+Math.sin(x*.08+t*.05)*5;x===0?ctx.moveTo(x,y):ctx.lineTo(x,y);}
    ctx.stroke();
    t++;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

/* ── Fallback particles ── */
function drawParticles(cv){
  const ctx=cv.getContext('2d'),W=cv.width,H=cv.height;
  const pts=Array.from({length:30},()=>({x:Math.random()*W,y:Math.random()*H,vx:(Math.random()-.5)*.8,vy:(Math.random()-.5)*.8,r:2+Math.random()*4,c:`hsl(${300+Math.random()*60},70%,70%)`,p:Math.random()*Math.PI*2}));
  let raf;
  function draw(){
    ctx.fillStyle='rgba(13,13,24,.15)';ctx.fillRect(0,0,W,H);
    pts.forEach(p=>{
      p.x+=p.vx;p.y+=p.vy;p.p+=.04;
      if(p.x<0||p.x>W)p.vx*=-1;if(p.y<0||p.y>H)p.vy*=-1;
      ctx.globalAlpha=.4+.6*Math.abs(Math.sin(p.p));ctx.fillStyle=p.c;ctx.beginPath();ctx.arc(p.x,p.y,p.r,0,Math.PI*2);ctx.fill();
    });
    ctx.globalAlpha=1;raf=requestAnimationFrame(draw);
  }
  draw();return()=>cancelAnimationFrame(raf);
}

makeStars();makePetals();newGame();
