<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para MoonCherry 🌸</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Lora:ital@0;1&display=swap" rel="stylesheet">
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="stars" id="stars"></div>
<div id="petals"></div>

<!-- PRIZE MODAL -->
<div class="prize-overlay" id="prizeOverlay">
  <div class="prize-box">
    <div class="prize-hdr">
      <span class="p-emoji" id="pEmoji"></span>
      <h2 id="pTitle"></h2>
    </div>
    <div class="prize-body" id="prizeBody"></div>
    <div class="prize-footer">
      <button class="btn" onclick="closePrize()"><span>💝 ¡Gracias!</span></button>
    </div>
  </div>
</div>

<!-- WIN OVERLAY -->
<div class="win-overlay" id="winOverlay">
  <div class="win-box">
    <div class="win-big">🌸💝🌸</div>
    <h2>¡Lo lograste!</h2>
    <p id="winMsg"></p>
    <button class="btn" onclick="newGame()"><span>🌙 Jugar de nuevo</span></button>
  </div>
</div>

<div class="wrapper">
  <header>
    <div class="from-lbl">de Kinosaby · para</div>
    <h1>Moon<span>Cherry</span> 🌸</h1>
    <p>Encuentra los pares · cada uno esconde algo especial para ti</p>
  </header>

  <div class="stats">
    <div>Intentos: <strong id="moveCnt">0</strong></div>
    <div>Parejas: <strong id="matchCnt">0</strong> / 6</div>
    <div>Partida: <strong id="gameCnt">1</strong></div>
  </div>

  <div class="grid" id="grid"></div>
  <button class="btn" onclick="newGame()"><span>🌙 Nuevo Juego</span></button>
  <footer>hecho con amor por <em>Kinosaby</em> &nbsp;·&nbsp; solo para <em>MoonCherry</em></footer>
</div>

<!-- Botón volver -->
<a href="../index.html" class="btn-volver">Volver al Portal</a>

<script src="script.js"></script>
</body>
</html>
