<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Jardín bajo la lluvia · Para Piojito</title>
<link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Cormorant+Garamond:ital,wght@0,300;1,300;1,400&family=Cinzel:wght@400&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<a href="../index.html" class="btn-back">← Volver</a>
<div id="scene">
  <div class="mist m1"></div>
  <div class="mist m2"></div>
  <div class="mist m3"></div>

  <canvas id="rain"></canvas>
  <canvas id="lightning-canvas"></canvas>
  <div id="thunder"></div>

  <div id="message">
    <div class="msg-tag">✦ Jardín bajo la lluvia ✦</div>
    <div class="msg-title">Para Piojito</div>
    <div class="msg-sub">a veces la lluvia también tiene algo bonito</div>
  </div>

  <div id="flowers-layer"></div>

  <div id="ground">
    <div class="puddle" style="left:10%;width:60px;height:20px;animation-delay:0s;"></div>
    <div class="puddle" style="left:35%;width:90px;height:28px;animation-delay:.7s;"></div>
    <div class="puddle" style="left:60%;width:70px;height:22px;animation-delay:1.4s;"></div>
    <div class="puddle" style="left:80%;width:50px;height:16px;animation-delay:.3s;"></div>
  </div>

  <div id="quote">
    <div class="quote-text">
      Espero que donde estés,<br>
      la lluvia también se vea bonita.
    </div>
    <div class="quote-from">— Kinosaby 🌧️</div>
  </div>
</div>

<script src="script.js"></script>
</body>
</html>
