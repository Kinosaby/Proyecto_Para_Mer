<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jardín de Lluvia · Para Mi Lady</title>
    <link href="https://fonts.googleapis.com/css2?family=Sacramento&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Cinzel:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <a href="../index.html" class="btn-back">← Volver al Portal</a>

    <div id="scene">
        <div class="mist m1"></div>
        <div class="mist m2"></div>
        <div class="mist m3"></div>
        
        <canvas id="rain"></canvas>
        <div id="ground"></div>
        <div id="thunder"></div>
        <canvas id="lightning-canvas"></canvas>

        <div id="message">
            <div class="msg-tag">✦ Refugio de Paz ✦</div>
            <h1 class="msg-title">Jardín de Lluvia</h1>
            <p class="msg-sub">Para que siempre encuentres calma, incluso en la tormenta</p>
        </div>

        <div id="quote">
            <p class="quote-text">"La lluvia no es solo agua que cae del cielo, es el abrazo de la naturaleza recordándote que después de la tormenta, siempre floreces."</p>
            <div class="quote-from">Con todo el amor para mi Lady · Kinosaby</div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
