<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jardín de Gerberas</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <a href="../?v=2" class="btn-back">← Volver</a>
  <div class="sky">
    <!-- Sol -->
    <div class="sun">
      <div class="sun-ray"></div>
      <div class="sun-ray"></div>
      <div class="sun-ray"></div>
      <div class="sun-ray"></div>
    </div>

    <!-- Nubes -->
    <div class="cloud cloud-1"></div>
    <div class="cloud cloud-2"></div>
    <div class="cloud cloud-3"></div>

    <!-- Mariposas -->
    <div class="butterfly butterfly-1">🦋</div>
    <div class="butterfly butterfly-2">🦋</div>
    <div class="butterfly butterfly-3">🦋</div>
  </div>

  <div class="garden-container">
    <h1 class="title">Jardín de Gerberas</h1>
    <p class="subtitle">Haz clic en las flores para verlas crecer 🌼</p>

    <div class="garden">
      <!-- Primera fila de gerberas -->
      <div class="gerbera gerbera-pink" data-color="pink">
        <div class="stem"></div>
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
        <div class="flower-head">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
      </div>

      <div class="gerbera gerbera-orange" data-color="orange">
        <div class="stem"></div>
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
        <div class="flower-head">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
      </div>

      <div class="gerbera gerbera-yellow" data-color="yellow">
        <div class="stem"></div>
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
        <div class="flower-head">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
      </div>

      <div class="gerbera gerbera-red" data-color="red">
        <div class="stem"></div>
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
        <div class="flower-head">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
      </div>

      <div class="gerbera gerbera-purple" data-color="purple">
        <div class="stem"></div>
        <div class="leaf leaf-left"></div>
        <div class="leaf leaf-right"></div>
        <div class="flower-head">
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="petal"></div>
          <div class="center"></div>
        </div>
      </div>
    </div>

    <!-- Información -->
    <div class="info-panel">
      <h2>🌼 Sobre las Gerberas</h2>
      <p>
        Las gerberas son flores alegres y coloridas originarias de Sudáfrica.
        Son símbolos de alegría, inocencia y pureza.
      </p>
      <div class="color-count">
        <span class="count-item">🌸 Rosa</span>
        <span class="count-item">🧡 Naranja</span>
        <span class="count-item">💛 Amarilla</span>
        <span class="count-item">❤️ Roja</span>
        <span class="count-item">💜 Morada</span>
      </div>
    </div>
  </div>

  <!-- Pasto -->
  <div class="grass"></div>

  <script src="script.js"></script>
</body>

</html>
