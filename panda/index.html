<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Panda Tierno</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <a href="../" class="btn-back">← Volver</a>
  <div class="container">
    <div class="panda">
      <!-- Cabeza -->
      <div class="head">
        <!-- Orejas -->
        <div class="ear ear-left"></div>
        <div class="ear ear-right"></div>

        <!-- Ojos -->
        <div class="eye eye-left">
          <div class="eye-patch"></div>
          <div class="eyeball">
            <div class="pupil">
              <div class="star star-1">⭐</div>
              <div class="star star-2">✨</div>
            </div>
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
          </div>
        </div>
        <div class="eye eye-right">
          <div class="eye-patch"></div>
          <div class="eyeball">
            <div class="pupil">
              <div class="star star-1">⭐</div>
              <div class="star star-2">✨</div>
            </div>
            <div class="sparkle sparkle-1"></div>
            <div class="sparkle sparkle-2"></div>
          </div>
        </div>

        <!-- Nariz -->
        <div class="nose"></div>

        <!-- Boca -->
        <div class="mouth">
          <div class="smile smile-left"></div>
          <div class="smile smile-right"></div>
        </div>

        <!-- Mejillas sonrojadas -->
        <div class="blush blush-left"></div>
        <div class="blush blush-right"></div>
      </div>

      <!-- Cuerpo -->
      <div class="body">
        <!-- Brazos -->
        <div class="arm arm-left">
          <div class="paw"></div>
        </div>
        <div class="arm arm-right">
          <div class="paw"></div>
        </div>

        <!-- Barriga -->
        <div class="belly"></div>
      </div>
    </div>

    <!-- Texto decorativo -->
    <h1 class="title">¡Hola! Soy un Panda <img src="../Assets/Icons/card-panda.svg" style="width:48px;vertical-align:middle;" alt="Panda"></h1>

    <!-- Corazones flotantes -->
    <div class="heart heart-1"><img src="../Assets/Icons/card-heart.svg" style="width:20px;" alt="Amor"></div>
    <div class="heart heart-2"><img src="../Assets/Icons/card-heart.svg" style="width:20px;" alt="Amor"></div>
    <div class="heart heart-3"><img src="../Assets/Icons/card-heart.svg" style="width:20px;" alt="Amor"></div>
    <div class="heart heart-4"><img src="../Assets/Icons/card-heart.svg" style="width:20px;" alt="Amor"></div>
    <div class="heart heart-5"><img src="../Assets/Icons/card-heart.svg" style="width:20px;" alt="Amor"></div>
    <div class="heart heart-6"><img src="../Assets/Icons/card-heart.svg" style="width:20px;" alt="Amor"></div>

    <!-- Estrellas decorativas -->
    <div class="deco-star deco-star-1">⭐</div>
    <div class="deco-star deco-star-2">✨</div>
    <div class="deco-star deco-star-3">🌟</div>

    <!-- Hojas de bambú decorativas -->
    <div class="bamboo bamboo-1"><img src="../Assets/Icons/section-gardens.svg" style="width:24px;" alt="Bambú"></div>
    <div class="bamboo bamboo-2"><img src="../Assets/Icons/section-gardens.svg" style="width:24px;" alt="Bambú"></div>
  </div>
</body>

</html>
