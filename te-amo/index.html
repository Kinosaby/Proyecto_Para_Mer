<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Te Amo 21 de Marzo</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <a href="../" class="btn-back">← Volver</a>
  <div class="container">
    <!-- Corazón principal animado -->
    <div class="main-heart-container">
      <div class="main-heart">
        <div class="heart-shine"></div>
        <div class="heart-sparkle"></div>
      </div>
    </div>

    <!-- Mensaje principal -->
    <div class="message-container">
      <h1 class="main-message">Te Amo</h1>
      <div class="date-special">
        <span class="date-number">21</span>
        <span class="date-text">de Marzo</span>
      </div>
      <p class="sub-message">Día de las Novias</p>
    </div>

    <!-- Pareja de enamorados -->
    <div class="couple-container">
      <div class="person person-left">
        <div class="head"></div>
        <div class="body"></div>
        <div class="heart-icon"><img src="../Assets/Icons/card-heart.svg" style="width:24px;" alt="Amor"></div>
      </div>
      <div class="person person-right">
        <div class="head"></div>
        <div class="body"></div>
        <div class="heart-icon"><img src="../Assets/Icons/card-heart.svg" style="width:24px;" alt="Amor"></div>
      </div>
      <div class="love-line"></div>
    </div>

    <!-- Flores decorativas -->
    <div class="flower flower-1"><img src="../Assets/Icons/card-piojito.svg" style="width:32px;" alt="Flor"></div>
    <div class="flower flower-2"><img src="../Assets/Icons/card-gerbera-field.svg" style="width:32px;" alt="Flor"></div>
    <div class="flower flower-3"><img src="../Assets/Icons/card-rose.svg" style="width:32px;" alt="Flor"></div>
    <div class="flower flower-4"><img src="../Assets/Icons/card-rose-dome.svg" style="width:32px;" alt="Flor"></div>
    <div class="flower flower-5"><img src="../Assets/Icons/card-bouquet.svg" style="width:32px;" alt="Flor"></div>

    <!-- Anillos -->
    <div class="rings-container">
      <div class="ring ring-1"><img src="../Assets/Icons/card-heart.svg" style="width:20px;filter:hue-rotate(180deg);" alt="Anillo"></div>
      <div class="ring ring-2"><img src="../Assets/Icons/card-heart.svg" style="width:20px;filter:hue-rotate(180deg);" alt="Anillo"></div>
    </div>

    <!-- Botón interactivo -->
    <button class="love-button" id="loveButton">
      <span class="button-text">Haz clic aquí <img src="../Assets/Icons/card-heart.svg" style="width:16px;vertical-align:middle;" alt="Amor"></span>
    </button>
  </div>

  <!-- Canvas para partículas -->
  <canvas id="heartsCanvas"></canvas>

  <script src="script.js"></script>
</body>

</html>
