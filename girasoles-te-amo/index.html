<!DOCTYPE html>
<html lang="es">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Para Ti - Te Amo</title>
  <link href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@700&family=Poppins:wght@400;600&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <a href="../" class="btn-back">← Volver</a>
  <!-- Fondo con corazones -->
  <div class="bg-layer">
    <div class="glow-orbs"></div>
    <div class="hearts-container" id="hearts"></div>
    <div class="stars-container" id="stars"></div>
    <div class="big-hearts" id="bigHearts"></div>
  </div>

  <div class="content">
    <h1 class="title">Para Ti - Te Amo <img src="../Assets/Icons/card-sunflower.svg" style="width:32px;vertical-align:middle;" alt="Girasol"></h1>

    <div class="garden" id="garden">
      <!-- Girasoles generados por JS -->
    </div>

    <p class="message" id="message">
      Cada girasol representa mi amor por ti <img src="../Assets/Icons/card-heart.svg" style="width:20px;vertical-align:middle;" alt="Amor">
    </p>
  </div>

  <script src="script.js"></script>
</body>

</html>
