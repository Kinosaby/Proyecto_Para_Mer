<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>En Proceso · Kinosaby</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Sacramento&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --rose:#c43060; --rose-g:#e05080;
      --gold:#c8903a; --gold-l:#e8c878;
      --cream:#f5ece0; --muted:rgba(245,236,224,.5); --dim:rgba(245,236,224,.25);
    }
    *,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}

    body {
      width:100vw; height:100vh; overflow:hidden;
      background:
        radial-gradient(ellipse at 15% 5%,  rgba(100,20,60,.45) 0%,transparent 50%),
        radial-gradient(ellipse at 85% 95%, rgba(70,15,50,.4)   0%,transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(40,10,35,.3)   0%,transparent 80%),
        #120810;
      font-family:'Montserrat',sans-serif;
      color:var(--cream);
      display:flex; align-items:center; justify-content:center;
    }

    #bg-canvas { position:fixed; inset:0; pointer-events:none; z-index:0; }

    /* petals */
    .petal { position:fixed; top:-40px; pointer-events:none; z-index:1; animation:petalFall linear infinite; }
    @keyframes petalFall {
      0%  { transform:translateY(-40px) rotate(0deg) translateX(0);    opacity:.6; }
      50% { transform:translateY(50vh)  rotate(200deg) translateX(22px);opacity:.35; }
      100%{ transform:translateY(110vh) rotate(400deg) translateX(-12px);opacity:0; }
    }

    /* ── CARD ── */
    .card {
      position:relative; z-index:2;
      max-width:480px; width:90%;
      background:rgba(255,255,255,.045);
      border:1px solid rgba(255,255,255,.09);
      border-radius:24px;
      padding:52px 44px 44px;
      text-align:center;
      backdrop-filter:blur(12px);
      box-shadow:0 20px 60px rgba(0,0,0,.5), 0 1px 0 rgba(255,255,255,.06) inset;
      animation:cardIn 1s cubic-bezier(.16,1,.3,1) both;
    }
    @keyframes cardIn{from{opacity:0;transform:translateY(28px) scale(.97);}to{opacity:1;transform:translateY(0) scale(1);}}

    /* top glow accent */
    .card::before {
      content:'';
      position:absolute; top:0; left:50%; transform:translateX(-50%);
      width:60%; height:1px;
      background:linear-gradient(90deg,transparent,rgba(196,48,96,.6),transparent);
    }

    /* gerbera row */
    .flowers {
      display:flex; justify-content:center; gap:10px; align-items:flex-end;
      margin-bottom:20px;
      animation:fadeUp .6s .3s both; opacity:0;
    }
    .hf1{animation:floatF 3.5s ease-in-out infinite;}
    .hf2{animation:floatF 3.5s ease-in-out .6s infinite;}
    .hf3{animation:floatF 3.5s ease-in-out 1.2s infinite;}
    @keyframes floatF{0%,100%{transform:translateY(0) rotate(-4deg);}50%{transform:translateY(-8px) rotate(4deg);}}

    .eyebrow {
      font-family:'Cormorant Garamond',serif;
      font-size:11px; letter-spacing:4.5px; text-transform:uppercase;
      color:var(--gold); opacity:.7; margin-bottom:10px;
      animation:fadeUp .6s .4s both; opacity:0;
    }

    .main-title {
      font-family:'Sacramento',cursive;
      font-size:clamp(44px,10vw,68px); line-height:1.05;
      color:var(--cream);
      text-shadow:0 0 40px rgba(196,48,96,.45);
      margin-bottom:6px;
      animation:fadeUp .7s .5s both; opacity:0;
    }

    /* pulsing dots */
    .dots {
      display:flex; justify-content:center; gap:8px;
      margin:20px 0 24px;
      animation:fadeUp .6s .6s both; opacity:0;
    }
    .dot {
      width:7px; height:7px; border-radius:50%;
      background:var(--rose);
      box-shadow:0 0 8px var(--rose-g);
      animation:dotPulse 1.4s ease-in-out infinite;
    }
    .dot:nth-child(1){animation-delay:0s;}
    .dot:nth-child(2){animation-delay:.25s;}
    .dot:nth-child(3){animation-delay:.5s;}
    @keyframes dotPulse{
      0%,100%{transform:scale(1);    opacity:.5;}
      50%    {transform:scale(1.5);  opacity:1;}
    }

    .desc {
      font-family:'Cormorant Garamond',serif;
      font-style:italic; font-weight:300;
      font-size:17px; line-height:1.8;
      color:var(--muted); margin-bottom:28px;
      animation:fadeUp .6s .7s both; opacity:0;
    }

    /* divider */
    .rule {
      display:flex; align-items:center; gap:12px;
      margin-bottom:24px;
      animation:fadeUp .6s .75s both; opacity:0;
    }
    .rule-line{flex:1;height:1px;background:linear-gradient(90deg,transparent,rgba(200,144,58,.3),transparent);}
    .rule-diamond{width:6px;height:6px;background:var(--rose);transform:rotate(45deg);box-shadow:0 0 7px var(--rose-g);flex-shrink:0;}

    /* back button */
    .back-btn {
      display:inline-flex; align-items:center; gap:8px;
      font-family:'Montserrat',sans-serif;
      font-size:11px; font-weight:500; letter-spacing:2.5px; text-transform:uppercase;
      color:var(--muted);
      background:rgba(255,255,255,.04);
      border:1px solid rgba(255,255,255,.1);
      border-radius:50px; padding:11px 22px;
      text-decoration:none; cursor:pointer;
      transition:all .3s;
      animation:fadeUp .6s .85s both; opacity:0;
    }
    .back-btn:hover {
      color:var(--cream);
      background:rgba(196,48,96,.1);
      border-color:rgba(196,48,96,.35);
      box-shadow:0 0 20px rgba(196,48,96,.12);
      transform:translateY(-2px);
    }

    /* progress bar decorative */
    .progress-wrap {
      margin-bottom:26px;
      animation:fadeUp .6s .78s both; opacity:0;
    }
    .progress-label {
      font-family:'Cormorant Garamond',serif;
      font-size:11px; letter-spacing:3px; text-transform:uppercase;
      color:var(--dim); margin-bottom:8px;
    }
    .progress-track {
      width:100%; height:3px;
      background:rgba(255,255,255,.07);
      border-radius:3px; overflow:hidden;
    }
    .progress-fill {
      height:100%; width:0%;
      background:linear-gradient(90deg,var(--rose),var(--gold-l));
      border-radius:3px;
      box-shadow:0 0 8px rgba(196,48,96,.5);
      animation:progressGrow 2s 1s cubic-bezier(.16,1,.3,1) forwards;
    }
    @keyframes progressGrow{ to{ width: 35%; } }

    /* footer sig */
    .sig {
      margin-top:20px;
      font-family:'Sacramento',cursive;
      font-size:22px; color:var(--gold-l); opacity:.45;
      animation:fadeUp .6s .95s both; opacity:0;
    }

    @keyframes fadeUp{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:translateY(0);}}

    @media(max-width:480px){
      .card{padding:40px 28px 36px;}
      .main-title{font-size:44px;}
    }
  </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<!-- SVG gerbera defs -->
<svg width="0" height="0" style="position:absolute">
  <defs>
    <g id="g-pink"><g fill="#d45080"><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(0 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(30 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(60 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(90 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(120 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(150 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(180 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(210 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(240 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(270 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(300 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(330 50 50)"/></g><circle cx="50" cy="50" r="13" fill="#1a0810"/><circle cx="50" cy="50" r="9" fill="#2a1018"/></g>
    <g id="g-red"><g fill="#d4504a"><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(0 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(30 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(60 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(90 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(120 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(150 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(180 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(210 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(240 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(270 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(300 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(330 50 50)"/></g><circle cx="50" cy="50" r="13" fill="#1e0a08"/><circle cx="50" cy="50" r="9" fill="#2e1008"/></g>
    <g id="g-gold"><g fill="#e8b840"><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(0 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(30 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(60 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(90 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(120 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(150 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(180 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(210 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(240 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(270 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(300 50 50)"/><ellipse cx="50" cy="18" rx="7" ry="18" transform="rotate(330 50 50)"/></g><circle cx="50" cy="50" r="13" fill="#1a1008"/><circle cx="50" cy="50" r="9" fill="#2a1c08"/></g>
  </defs>
</svg>

<div class="card">

  <div class="flowers">
    <svg class="hf1" width="40" height="40" viewBox="0 0 100 100"><use href="#g-pink"/></svg>
    <svg class="hf2" width="52" height="52" viewBox="0 0 100 100"><use href="#g-red"/></svg>
    <svg class="hf3" width="40" height="40" viewBox="0 0 100 100"><use href="#g-gold"/></svg>
  </div>

  <div class="eyebrow">✦ En proceso de creación ✦</div>
  <div class="main-title">Disponible<br>Pronto</div>

  <div class="dots">
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <div class="desc">
    Kinosaby está trabajando<br>
    en algo bonito para ti, Piojito.<br>
    Vuelve pronto. 🌸
  </div>

  <div class="progress-wrap">
    <div class="progress-label">Progreso</div>
    <div class="progress-track">
      <div class="progress-fill"></div>
    </div>
  </div>

  <div class="rule">
    <div class="rule-line"></div>
    <div class="rule-diamond"></div>
    <div class="rule-line"></div>
  </div>

  <a href="../../" class="back-btn">← Volver al inicio</a>

  <div class="sig">Kinosaby</div>

</div>

<script>
  // STARS
  const canvas=document.getElementById('bg-canvas'),ctx=canvas.getContext('2d');
  let W,H,stars=[];
  function init(){
    W=canvas.width=window.innerWidth; H=canvas.height=window.innerHeight;
    stars=Array.from({length:180},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.2+.2,a:Math.random()*.7+.1,sp:.002+Math.random()*.007,ph:Math.random()*Math.PI*2}));
  }
  function draw(t){
    ctx.clearRect(0,0,W,H);
    stars.forEach(s=>{const a=s.a*(.45+.55*Math.sin(t*s.sp+s.ph));ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fillStyle=`rgba(245,236,224,${a})`;ctx.fill();});
    requestAnimationFrame(draw);
  }
  init(); requestAnimationFrame(draw);
  window.addEventListener('resize',init);

  // PETALS
  const cols=['#c43060','#d45080','#e8b840','#c8903a','#d4504a'];
  for(let i=0;i<18;i++){
    const p=document.createElement('div'); p.className='petal';
    const c=cols[Math.floor(Math.random()*cols.length)], sz=6+Math.random()*9;
    p.innerHTML=`<svg width="${sz}" height="${sz}" viewBox="0 0 20 20"><ellipse cx="10" cy="10" rx="4" ry="9" fill="${c}" opacity=".6" transform="rotate(${Math.random()*360} 10 10)"/></svg>`;
    p.style.cssText=`left:${Math.random()*100}vw;animation-duration:${8+Math.random()*10}s;animation-delay:${Math.random()*14}s;`;
    document.body.appendChild(p);
  }
</script>
</body>
</html>
