<!DOCTYPE html>
<html lang="es">
<head>

<body>
<div id="custom-cursor"></div>
<div id="crt">

    <div id="timestamp">30/04/2026 &nbsp; 00:00:00</div>

    <div id="content">
      <div id="play-screen">
        <svg id="cassette-svg" width="160" height="96" viewBox="0 0 160 96">
          <rect x="4" y="4" width="152" height="88" rx="8" fill="#1a0028" stroke="#ff2d78" stroke-width="2"/>

          <circle id="reel-r" cx="110" cy="40" r="18" fill="none" stroke="#00f5ff" stroke-width="2"/>

          <rect x="32" y="22" width="96" height="3" rx="1" fill="#333"/>
          <path d="M 62 75 Q 80 68 98 75" fill="none" stroke="#444" stroke-width="2"/>
        </svg>
        <button id="play-btn" onclick="startShow()">▶ PRESS PLAY</button>
      </div>
      <div id="main-screen">
        <div id="glitch-name" data-text="América Azyade">América Azyade</div>
        <div id="sub-text">Feliz Cumpleaños · 30 Abril 2026</div>

          <span class="nick-tag">Pulga</span>
          <span class="nick-tag">MoonCherry</span>
        </div>
        <div id="message-box">
          Eres la canción favorita<br>
          que suena en loop en mi cabeza.<br>
          Hoy el universo te dedica<br>
          su mejor frecuencia. 📼
        </div>
        <div id="date-vhs">// 30 · IV · MMXXVI //</div>
      </div>
    </div>
    <div id="hint-vhs">[ toca la pantalla para efectos ]</div>
  </div>
</div>
