<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday, MoonCherry 🌙🍒</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=EB+Garamond:ital,wght@0,400;0,500;1,400&family=Cinzel:wght@400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --moon-glow: #fff8e7;
    --cherry-red: #c8334a;
    --cherry-pink: #e8728a;
    --cherry-light: #f5b8c4;
    --petal-pale: #fde8ef;
    --gold: #d4a855;
    --gold-light: #f0cc80;
    --deep-night: #04060f;
    --mid-night: #080c1a;
    --star-blue: #b8c8ff;
  }

  html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: var(--deep-night);
    font-family: 'Cormorant Garamond', serif;
    cursor: none;
  }

  #sky-canvas {
    position: fixed; inset: 0;
    width: 100%; height: 100%;
    z-index: 0;
  }

  #custom-cursor {
    position: fixed;
    width: 12px; height: 12px;
    background: radial-gradient(circle, #fff8e7 0%, var(--cherry-pink) 60%, transparent 100%);
    border-radius: 50%;
    pointer-events: none;
    z-index: 9999;
    transform: translate(-50%, -50%);
    transition: transform 0.05s;
    mix-blend-mode: screen;
  }

  #ui {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    z-index: 10;
    gap: 0;
    padding: 2rem;
  }

  .line {
    opacity: 0;
    transform: translateY(24px);
    transition: opacity 1.4s cubic-bezier(0.22,1,0.36,1), transform 1.4s cubic-bezier(0.22,1,0.36,1);
    text-align: center;
    will-change: opacity, transform;
  }
  .line.visible { opacity: 1; transform: translateY(0); }

  #label-top {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.65rem, 1.5vw, 0.85rem);
    letter-spacing: 0.35em;
    color: var(--gold-light);
    text-transform: uppercase;
    margin-bottom: 1.8rem;
  }

  #main-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(3rem, 9vw, 7rem);
    font-weight: 300;
    letter-spacing: 0.04em;
    line-height: 1.05;
    color: transparent;
    background: linear-gradient(135deg, var(--moon-glow) 0%, var(--gold-light) 30%, var(--cherry-light) 65%, #fff 100%);
    -webkit-background-clip: text;
    background-clip: text;
    margin-bottom: 0.3rem;
    position: relative;
  }

  #sub-name {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(1.4rem, 4vw, 3rem);
    font-weight: 300;
    font-style: italic;
    color: var(--cherry-light);
    letter-spacing: 0.08em;
    margin-bottom: 2.2rem;
  }

  #divider {
    width: 160px; height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--cherry-pink), var(--gold), transparent);
    margin-bottom: 2.2rem;
    opacity: 0;
    transition: opacity 1.4s ease;
  }
  #divider.visible { opacity: 1; }

  #nicknames {
    display: flex; gap: 1.8rem; flex-wrap: wrap; justify-content: center;
    margin-bottom: 2.4rem;
  }
  .nick {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.6rem, 1.4vw, 0.78rem);
    letter-spacing: 0.25em;
    color: var(--cherry-pink);
    text-transform: uppercase;
    opacity: 0;
    transform: translateY(10px);
    transition: opacity 1.2s ease, transform 1.2s ease;
    position: relative;
  }
  .nick::before {
    content: '✦';
    margin-right: 0.5em;
    font-size: 0.6em;
    color: var(--gold);
  }
  .nick.visible { opacity: 1; transform: translateY(0); }

  #message {
    font-family: 'EB Garamond', serif;
    font-size: clamp(0.85rem, 2.2vw, 1.15rem);
    font-style: italic;
    color: rgba(255,232,220,0.75);
    max-width: 480px;
    line-height: 1.9;
    text-align: center;
    letter-spacing: 0.01em;
    margin-bottom: 2.5rem;
  }

  #date-line {
    font-family: 'Cinzel', serif;
    font-size: clamp(0.6rem, 1.3vw, 0.75rem);
    letter-spacing: 0.4em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 2.8rem;
  }

  #hint {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(0.7rem, 1.5vw, 0.85rem);
    font-style: italic;
    color: rgba(255,255,255,0.35);
    letter-spacing: 0.08em;
  }
  #hint.visible {
    animation: breathe 3s ease-in-out infinite;
  }

  @keyframes breathe {
    0%,100% { opacity: 0.3; }
    50% { opacity: 0.65; }
  }

  #moon-container {
    position: fixed;
    top: -5vw; right: 8vw;
    z-index: 1;
    pointer-events: none;
  }

  #moon-svg {
    width: clamp(130px, 22vw, 260px);
    height: clamp(130px, 22vw, 260px);
    animation: moonFloat 8s ease-in-out infinite;
    opacity: 0;
    transition: opacity 2.5s ease;
  }
  #moon-svg.visible { opacity: 1; }

  @keyframes moonFloat {
    0%,100% { transform: translateY(0px); }
    50% { transform: translateY(-12px); }
  }

  #burst-canvas {
    position: fixed; inset: 0;
    pointer-events: none;
    z-index: 20;
  }

  .sparkle-text {
    position: fixed;
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    color: var(--cherry-light);
    pointer-events: none;
    z-index: 25;
    animation: floatUp 2.2s ease forwards;
    font-size: 0.85rem;
    letter-spacing: 0.05em;
    white-space: nowrap;
  }
  @keyframes floatUp {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    100% { opacity: 0; transform: translateY(-80px) scale(0.7); }
  }

  .glow-pulse {
    animation: glowPulse 4s ease-in-out infinite;
  }
  @keyframes glowPulse {
    0%,100% { filter: drop-shadow(0 0 8px rgba(232,114,138,0.4)); }
    50% { filter: drop-shadow(0 0 22px rgba(232,114,138,0.75)); }
  }
</style>
</head>
<body>

<canvas id="sky-canvas"></canvas>
<canvas id="burst-canvas"></canvas>
<div id="custom-cursor"></div>

<!-- Moon -->
<div id="moon-container">
  <svg id="moon-svg" class="glow-pulse" viewBox="0 0 260 260" xmlns="http://www.w3.org/2000/svg">
    <defs>
      <radialGradient id="moonGrad" cx="42%" cy="38%" r="58%">
        <stop offset="0%" stop-color="#fff8e7"/>
        <stop offset="40%" stop-color="#ffe8b0"/>
        <stop offset="100%" stop-color="#c8904a"/>
      </radialGradient>
      <radialGradient id="moonGlow" cx="50%" cy="50%" r="50%">
        <stop offset="60%" stop-color="transparent"/>
        <stop offset="100%" stop-color="rgba(255,220,120,0.18)"/>
      </radialGradient>
      <filter id="softBlur">
        <feGaussianBlur stdDeviation="3"/>
      </filter>
    </defs>
    <!-- glow halo -->
    <circle cx="130" cy="110" r="110" fill="url(#moonGlow)" filter="url(#softBlur)" opacity="0.9"/>
    <!-- moon body -->
    <circle cx="130" cy="110" r="72" fill="url(#moonGrad)"/>
    <!-- craters -->
    <circle cx="110" cy="95" r="8" fill="rgba(0,0,0,0.06)"/>
    <circle cx="148" cy="128" r="5" fill="rgba(0,0,0,0.05)"/>
    <circle cx="125" cy="135" r="3.5" fill="rgba(0,0,0,0.04)"/>
    <!-- shadow crescent -->
    <path d="M 130 38 A 72 72 0 0 0 130 182 A 55 72 0 0 1 130 38 Z" fill="rgba(60,30,10,0.22)"/>
    <!-- cherry blossom on moon -->
    <g transform="translate(142, 80)" opacity="0.85">
      <circle cx="0" cy="0" r="5" fill="#f5b8c4"/>
      <circle cx="7" cy="-3" r="4.5" fill="#e8728a"/>
      <circle cx="7" cy="5" r="4.5" fill="#f5b8c4"/>
      <circle cx="-3" cy="7" r="4.5" fill="#e8728a"/>
      <circle cx="-6" cy="-2" r="4.5" fill="#f5b8c4"/>
      <circle cx="1" cy="1" r="3" fill="#fff0f4"/>
      <line x1="1" y1="1" x2="5" y2="12" stroke="#7a3a3a" stroke-width="1" stroke-linecap="round"/>
    </g>
    <!-- second small blossom -->
    <g transform="translate(105, 130)" opacity="0.6">
      <circle cx="0" cy="0" r="3.5" fill="#f5b8c4"/>
      <circle cx="5" cy="-2" r="3" fill="#e8728a"/>
      <circle cx="5" cy="4" r="3" fill="#f5b8c4"/>
      <circle cx="-2" cy="5" r="3" fill="#e8728a"/>
      <circle cx="-4" cy="-1" r="3" fill="#f5b8c4"/>
      <circle cx="0.5" cy="1" r="2" fill="#fff0f4"/>
    </g>
  </svg>
</div>

<!-- Main UI -->
<div id="ui">
  <p class="line" id="label-top">30 de Abril &nbsp;·&nbsp; Un día especial</p>
  <h1 class="line" id="main-name">América Azyade</h1>
  <p class="line" id="sub-name">Feliz Cumpleaños</p>
  <div id="divider"></div>
  <div id="nicknames" class="line">
    <span class="nick" id="n1">Piojito</span>
    <span class="nick" id="n2">Pulga</span>
    <span class="nick" id="n3">MoonCherry</span>
  </div>
  <p class="line" id="message">
    Hay personas que llegan a tu vida<br>
    y la iluminan como la luna ilumina la noche.<br>
    Tú eres una de esas personas.<br>
    Hoy el universo celebra que existes.
  </p>
  <p class="line" id="date-line">Abril · 30 · 2026</p>
  <p class="line" id="hint">toca la pantalla para crear magia ✦</p>
</div>

<script>
// ─── CANVAS SKY ───────────────────────────────────────────
const sky = document.getElementById('sky-canvas');
const sCtx = sky.getContext('2d');
const burst = document.getElementById('burst-canvas');
const bCtx = burst.getContext('2d');
const cursor = document.getElementById('custom-cursor');

let W, H;
function resize() {
  W = sky.width = burst.width = window.innerWidth;
  H = sky.height = burst.height = window.innerHeight;
}
resize();
window.addEventListener('resize', () => { resize(); initStars(); });

// Stars
let stars = [];
function initStars() {
  stars = [];
  const count = Math.floor((W * H) / 4800);
  for (let i = 0; i < count; i++) {
    stars.push({
      x: Math.random() * W,
      y: Math.random() * H * 0.75,
      r: Math.random() * 1.4 + 0.2,
      alpha: Math.random(),
      speed: Math.random() * 0.006 + 0.002,
      phase: Math.random() * Math.PI * 2,
      color: Math.random() < 0.15 ? '#ffd8aa' : (Math.random() < 0.2 ? '#b8c8ff' : '#ffffff')
    });
  }
}
initStars();

// Petals
const PETAL_COLORS = ['#f5b8c4','#e8728a','#fde8ef','#d4687e','#f9d0db','#c8334a'];
let petals = [];
function spawnPetal() {
  petals.push({
    x: Math.random() * (W + 200) - 100,
    y: -30,
    r: Math.random() * 8 + 5,
    vx: Math.random() * 1.5 - 0.4,
    vy: Math.random() * 1.2 + 0.5,
    angle: Math.random() * Math.PI * 2,
    spin: (Math.random() - 0.5) * 0.05,
    alpha: Math.random() * 0.5 + 0.4,
    color: PETAL_COLORS[Math.floor(Math.random() * PETAL_COLORS.length)],
    wobble: Math.random() * Math.PI * 2,
    wobbleSpeed: Math.random() * 0.03 + 0.01
  });
}
for (let i = 0; i < 40; i++) {
  const p = { x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*8+5, vx: Math.random()*1.5-0.4,
    vy: Math.random()*1.2+0.5, angle: Math.random()*Math.PI*2,
    spin: (Math.random()-0.5)*0.05, alpha: Math.random()*0.5+0.4,
    color: PETAL_COLORS[Math.floor(Math.random()*PETAL_COLORS.length)],
    wobble: Math.random()*Math.PI*2, wobbleSpeed: Math.random()*0.03+0.01 };
  petals.push(p);
}

function drawPetal(ctx, p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.angle);
  ctx.globalAlpha = p.alpha;
  ctx.fillStyle = p.color;
  ctx.beginPath();
  ctx.ellipse(0, 0, p.r, p.r * 0.55, 0, 0, Math.PI * 2);
  ctx.fill();
  ctx.restore();
}

// Fireflies
let flies = [];
for (let i = 0; i < 18; i++) {
  flies.push({
    x: Math.random()*W, y: Math.random()*H,
    r: Math.random()*2+1,
    vx: (Math.random()-0.5)*0.4, vy: (Math.random()-0.5)*0.4,
    phase: Math.random()*Math.PI*2,
    speed: Math.random()*0.025+0.01
  });
}

// Burst particles
let bursts = [];
function addBurst(x, y) {
  const colors = ['#f5b8c4','#e8728a','#ffd080','#ffffff','#d4687e','#fde8ef'];
  for (let i = 0; i < 38; i++) {
    const ang = Math.random()*Math.PI*2;
    const spd = Math.random()*5+1.5;
    bursts.push({
      x, y,
      vx: Math.cos(ang)*spd, vy: Math.sin(ang)*spd - 2,
      r: Math.random()*5+2,
      color: colors[Math.floor(Math.random()*colors.length)],
      alpha: 1,
      life: Math.floor(Math.random()*40+30),
      maxLife: 0,
      spin: (Math.random()-0.5)*0.15,
      angle: Math.random()*Math.PI*2,
      isPetal: Math.random() < 0.6
    });
    bursts[bursts.length-1].maxLife = bursts[bursts.length-1].life;
  }
}

let t = 0;
let spawnTimer = 0;

function draw() {
  t++;
  sCtx.clearRect(0, 0, W, H);

  // Sky gradient
  const grad = sCtx.createLinearGradient(0, 0, 0, H);
  grad.addColorStop(0, '#04060f');
  grad.addColorStop(0.45, '#08101e');
  grad.addColorStop(0.75, '#100a14');
  grad.addColorStop(1, '#1a0a10');
  sCtx.fillStyle = grad;
  sCtx.fillRect(0, 0, W, H);

  // Stars
  stars.forEach(s => {
    const glow = (Math.sin(t * s.speed + s.phase) + 1) / 2;
    sCtx.globalAlpha = 0.2 + glow * 0.8;
    sCtx.fillStyle = s.color;
    sCtx.beginPath();
    sCtx.arc(s.x, s.y, s.r * (0.8 + glow * 0.4), 0, Math.PI * 2);
    sCtx.fill();
  });
  sCtx.globalAlpha = 1;

  // Fireflies
  flies.forEach(f => {
    f.x += f.vx; f.y += f.vy;
    f.phase += f.speed;
    if (f.x < 0) f.x = W; if (f.x > W) f.x = 0;
    if (f.y < 0) f.y = H; if (f.y > H) f.y = 0;
    const glow2 = (Math.sin(f.phase)+1)/2;
    sCtx.globalAlpha = glow2 * 0.55;
    const rg = sCtx.createRadialGradient(f.x,f.y,0,f.x,f.y,f.r*5);
    rg.addColorStop(0,'#ffe8b0');
    rg.addColorStop(1,'transparent');
    sCtx.fillStyle = rg;
    sCtx.beginPath();
    sCtx.arc(f.x, f.y, f.r*5, 0, Math.PI*2);
    sCtx.fill();
    sCtx.globalAlpha = 1;
  });

  // Petals
  spawnTimer++;
  if (spawnTimer > 28) { spawnPetal(); spawnTimer = 0; }
  petals.forEach((p, i) => {
    p.wobble += p.wobbleSpeed;
    p.x += p.vx + Math.sin(p.wobble) * 0.5;
    p.y += p.vy;
    p.angle += p.spin;
    drawPetal(sCtx, p);
    if (p.y > H + 30) {
      petals[i] = {
        x: Math.random()*(W+200)-100, y:-30,
        r: Math.random()*8+5, vx: Math.random()*1.5-0.4,
        vy: Math.random()*1.2+0.5, angle: Math.random()*Math.PI*2,
        spin: (Math.random()-0.5)*0.05, alpha: Math.random()*0.5+0.4,
        color: PETAL_COLORS[Math.floor(Math.random()*PETAL_COLORS.length)],
        wobble: Math.random()*Math.PI*2, wobbleSpeed: Math.random()*0.03+0.01
      };
    }
  });

  // Burst canvas
  bCtx.clearRect(0,0,W,H);
  bursts = bursts.filter(b => b.life > 0);
  bursts.forEach(b => {
    b.x += b.vx; b.y += b.vy;
    b.vy += 0.1;
    b.vx *= 0.97;
    b.life--;
    b.angle += b.spin;
    const progress = b.life / b.maxLife;
    bCtx.globalAlpha = progress * b.alpha;
    bCtx.fillStyle = b.color;
    if (b.isPetal) {
      bCtx.save();
      bCtx.translate(b.x, b.y);
      bCtx.rotate(b.angle);
      bCtx.beginPath();
      bCtx.ellipse(0, 0, b.r, b.r * 0.5, 0, 0, Math.PI*2);
      bCtx.fill();
      bCtx.restore();
    } else {
      bCtx.beginPath();
      bCtx.arc(b.x, b.y, Math.max(0, b.r * progress), 0, Math.PI*2);
      bCtx.fill();
    }
  });
  bCtx.globalAlpha = 1;

  requestAnimationFrame(draw);
}
draw();

// ─── CURSOR ───────────────────────────────────────────────
document.addEventListener('mousemove', e => {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
});

// ─── CLICK MAGIC ──────────────────────────────────────────
const phrases = [
  'te quiero', '🌙', 'MoonCherry', '✦', 'feliz cumple',
  'eres mágica', '🍒', 'Piojito', 'te extraño', 'Pulga ♥',
  'brilla siempre', '✨', 'te adoro', '🌸', 'eres especial'
];
document.addEventListener('click', e => {
  addBurst(e.clientX, e.clientY);
  // Float phrase
  const el = document.createElement('div');
  el.className = 'sparkle-text';
  el.textContent = phrases[Math.floor(Math.random()*phrases.length)];
  el.style.left = (e.clientX - 40) + 'px';
  el.style.top = (e.clientY - 20) + 'px';
  el.style.fontSize = (Math.random()*0.35 + 0.7) + 'rem';
  document.body.appendChild(el);
  setTimeout(() => el.remove(), 2400);
});

// ─── REVEAL SEQUENCE ──────────────────────────────────────
function show(id, delay) {
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) el.classList.add('visible');
  }, delay);
}

setTimeout(() => document.getElementById('moon-svg').classList.add('visible'), 300);
show('label-top', 1000);
show('main-name', 2000);
show('sub-name', 3200);
setTimeout(() => document.getElementById('divider').classList.add('visible'), 4200);
// nicknames staggered
setTimeout(() => {
  ['n1','n2','n3'].forEach((id,i) => {
    setTimeout(() => document.getElementById(id).classList.add('visible'), i*320);
  });
  document.getElementById('nicknames').classList.add('visible');
}, 4600);
show('message', 6000);
show('date-line', 7800);
show('hint', 9200);

// Touch support
document.addEventListener('touchstart', e => {
  const t = e.touches[0];
  addBurst(t.clientX, t.clientY);
  const el = document.createElement('div');
  el.className = 'sparkle-text';
  el.textContent = phrases[Math.floor(Math.random()*phrases.length)];
  el.style.left = (t.clientX-40)+'px';
  el.style.top = (t.clientY-20)+'px';
  document.body.appendChild(el);
  setTimeout(()=>el.remove(),2400);
}, {passive:true});
</script>
</body>
</html>
